<!DOCTYPE html>
<html>
<head>
<title>Register</title>
</head>

<body style="font-family:Arial; background:#f4f4f4;">

<div style="width:350px; margin:80px auto; background:white; padding:25px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2);">

<h2 style="text-align:center;">Create Account</h2>

<form method="POST">

<label>Username</label><br>
<input type="text" name="username" required style="width:100%; padding:8px;"><br><br>

<label>Password</label><br>
<input type="password" name="password" required style="width:100%; padding:8px;"><br><br>

<button type="submit">Register</button>

</form>

<br>
<a href="/login">Back to Login</a>

</div>

</body>
</html>
