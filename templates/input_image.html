<!DOCTYPE html>
<html>
<head>
    <title>Crop Image Prediction</title>
</head>

<body style="font-family:Arial; background:#f4f4f4;">

<div style="width:400px; margin:60px auto; background:white; padding:25px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.2);">

<h2 style="text-align:center;">📷 Crop Image Prediction</h2>

<form action="/input/image" method="POST" enctype="multipart/form-data">

<label>Select Crop</label>
<br>

<select name="crop" required style="width:100%; padding:8px;">
<option value="">Select Crop</option>
<option value="Rice">Rice</option>
<option value="Wheat">Wheat</option>
<option value="Maize">Maize</option>
<option value="Cotton">Cotton</option>
<option value="Sugarcane">Sugarcane</option>
</select>

<br><br>

<label>Upload Crop Image</label>
<br>

<input type="file" name="image" accept="image/*" required>

<br><br>

<button type="submit">Predict Yield</button>

</form>

<br>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>
</html>
