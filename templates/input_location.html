<!DOCTYPE html>
<html>
<head>
    <title>{{ texts.title_location if texts else "Location Input" }}</title>

    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="{{ url_for('static', filename='js/voice.js') }}"></script>
</head>

<body>

<h2>📍 {{ texts.title_location if texts else "Location Input" }}</h2>

<form method="POST">

    <label>{{ texts.state if texts else "State" }}:</label><br>
    <select id="state" name="state" required>
        <option value="">{{ texts.select_state if texts else "Select State" }}</option>
    </select>

    <button type="button" onclick="startVoiceInput('state')">🎤 Speak State</button>

    <br><br>

    <label>{{ texts.district if texts else "District" }}:</label><br>
    <select id="district" name="district" required>
        <option value="">{{ texts.select_district if texts else "Select District" }}</option>
    </select>

    <button type="button" onclick="startVoiceInput('district')">🎤 Speak District</button>

    <br><br>

    <label>{{ texts.crop if texts else "Crop" }}:</label><br>

    <select id="crop_select" onchange="toggleOtherCrop()" required>
        <option value="">{{ texts.select_crop if texts else "Select Crop" }}</option>

        <option value="Rice">Rice</option>
        <option value="Wheat">Wheat</option>
        <option value="Maize">Maize</option>
        <option value="Millets">Millets</option>
        <option value="Sorghum">Sorghum</option>
        <option value="Bajra">Bajra</option>
        <option value="Barley">Barley</option>
        <option value="Pulses">Pulses</option>
        <option value="Groundnut">Groundnut</option>
        <option value="Mustard">Mustard</option>
        <option value="Soybean">Soybean</option>
        <option value="Cotton">Cotton</option>
        <option value="Sugarcane">Sugarcane</option>
        <option value="Tea">Tea</option>
        <option value="Coffee">Coffee</option>
        <option value="Other">{{ texts.other if texts else "Other" }}</option>
    </select>

    <br><br>

    <div id="other_crop_div" style="display:none;">
        <label>{{ texts.crop if texts else "Crop" }}:</label><br>
        <input type="text" id="other_crop" placeholder="{{ texts.crop if texts else 'Crop' }}">
        <button type="button" onclick="startVoiceInput('other_crop')">🎤 Speak Crop</button>
        <br><br>
    </div>

    <input type="hidden" id="final_crop" name="crop" required>
    <!-- ADD ONLY THIS BLOCK BEFORE SUBMIT BUTTON -->

<!-- ✅ NEW: LAND AREA -->
<label>Land Area (Acres):</label><br>
<input type="number" name="acre" step="0.1" placeholder="Enter acres" required>

<br><br>

    
    <button type="submit">{{ texts.continue if texts else "Continue" }}</button>

</form>

<br>
<a href="/dashboard">⬅ {{ texts.back if texts else "Back" }}</a>

<script>
let stateDistrictMap = {};

fetch("/static/data/states-and-districts.json")
.then(response => response.json())
.then(data => {
    data.states.forEach(item => {
        stateDistrictMap[item.state] = item.districts;
    });

    const stateSelect = document.getElementById("state");

    Object.keys(stateDistrictMap).sort().forEach(state => {
        const option = document.createElement("option");
        option.value = state;
        option.text = state;
        stateSelect.appendChild(option);
    });
});

document.getElementById("state").addEventListener("change", function () {
    const districtSelect = document.getElementById("district");
    districtSelect.innerHTML = "<option value=''>Select District</option>";

    const selectedState = this.value;

    if (stateDistrictMap[selectedState]) {
        stateDistrictMap[selectedState].forEach(district => {
            const option = document.createElement("option");
            option.value = district;
            option.text = district;
            districtSelect.appendChild(option);
        });
    }
});

function toggleOtherCrop(){
    const cropSelect = document.getElementById("crop_select");
    const otherDiv = document.getElementById("other_crop_div");
    const finalCrop = document.getElementById("final_crop");

    if(cropSelect.value === "Other"){
        otherDiv.style.display = "block";
        finalCrop.value = "";
    }else{
        otherDiv.style.display = "none";
        finalCrop.value = cropSelect.value;
    }
}

document.getElementById("other_crop").addEventListener("input", function(){
    document.getElementById("final_crop").value = this.value;
});
</script>

</body>
</html>
