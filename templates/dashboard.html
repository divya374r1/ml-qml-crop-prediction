<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet" href="/static/css/style.css">

<script src="{{ url_for('static', filename='js/voice_assistant.js') }}"></script>

</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">

<h1>Crop Yield Prediction</h1>

<p>Satellite Data • ML • Quantum ML</p>

</div>
</div>

<div class="container">

<div style="text-align:center;margin-bottom:30px;">

<button onclick="startVoiceAssistant('{{ language }}')">

🎤 {{ texts.speak_command }}

</button>

</div>


<div class="card-grid">

<!-- LOCATION -->

<a href="/input/location" class="card">

<img src="/static/images/crops/rice.jpg">

<div class="card-content">

<h3>📍 {{ texts.title_location }}</h3>

<p>{{ texts.desc_location }}</p>

</div>

</a>


<!-- MANUAL -->

<a href="/input/manual" class="card">

<img src="/static/images/crops/wheat.jpg">

<div class="card-content">

<h3>✍ {{ texts.title_manual }}</h3>

<p>{{ texts.desc_manual }}</p>

</div>

</a>


<!-- IMAGE -->

<a href="/input/image" class="card">

<img src="/static/images/crops/maize.jpg">

<div class="card-content">

<h3>📷 {{ texts.title_image }}</h3>

<p>{{ texts.desc_image }}</p>

</div>

</a>

</div>

<div style="text-align:center;margin-top:35px;">

<a href="/logout">{{ texts.back }}</a>

</div>

</div>

<script>

window.speechSynthesis.onvoiceschanged = function(){

let message="{{ texts.welcome }}"

let language="{{ language }}"

speakMessage(message,language)

}

</script>
</body>
</html>
